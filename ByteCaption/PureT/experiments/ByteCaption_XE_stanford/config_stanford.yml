LOGGER_NAME: 'log'
SEED: 1234

############################ TRAIN ############################
TRAIN:
  BATCH_SIZE: 4
  REINFORCEMENT:
    START: 9999

############################ TEST ############################
TEST:
  BATCH_SIZE: 8

############################ DATA_LOADER ############################
DATA_LOADER:
  NUM_WORKERS: 4
  SHUFFLE: True
  TRAIN_GV_FEAT: ''
  TRAIN_ATT_FEATS: ''
  VAL_GV_FEAT: ''
  VAL_ATT_FEATS: ''
  TEST_GV_FEAT: ''
  TEST_ATT_FEATS: ''
  TRAIN_ID: './PureT/data/stanford_dogs_hf/train_ids.json'
  VAL_ID: './PureT/data/stanford_dogs_hf/validation_ids.json'
  TEST_ID: './PureT/data/stanford_dogs_hf/validation_ids.json'
  TEST_4W_ID: './PureT/data/stanford_dogs_hf/validation_ids.json'
  INPUT_SEQ_PATH: ''
  TARGET_SEQ_PATH: ''
  SEQ_PER_IMG: 1
  MAX_FEAT: -1

############################ CORRUPTION ############################
CORRUPTION:
  BYTE_STREAM_TYPES: []
  BYTE_STREAM_LEVEL: 'S0'

############################ MODEL ############################
MODEL:
  TYPE: 'PureT_byteformer'

  SEQ_LEN: 17
  VOCAB_SIZE: 9487
  WORD_EMBED_DIM: 512
  WORD_EMBED_ACT: 'CELU'
  WORD_EMBED_NORM: True
  DROPOUT_WORD_EMBED: 0.1
  GVFEAT_DIM: 1
  GVFEAT_EMBED_DIM: -1
  GVFEAT_EMBED_ACT: 'NONE'
  DROPOUT_GV_EMBED: 0.0
  ATT_FEATS_DIM: 192
  ATT_FEATS_EMBED_DIM: 512
  ATT_FEATS_EMBED_ACT: 'CELU'
  DROPOUT_ATT_EMBED: 0.1
  ATT_FEATS_NORM: False
  ATT_HIDDEN_SIZE: -1
  ATT_HIDDEN_DROP: 0.0
  ATT_ACT: 'TANH'
  RNN_SIZE: 512
  DROPOUT_LM: 0.1

  BOTTOM_UP:
    DROPOUT_FIRST_INPUT: 0.0
    DROPOUT_SEC_INPUT: 0.0

  BILINEAR:
    DIM: 512
    ENCODE_ATT_MID_DIM: [64, 32, 64]
    DECODE_ATT_MID_DIM: [64, 32, 64]
    ENCODE_ATT_MID_DROPOUT: 0.1
    DECODE_ATT_MID_DROPOUT: 0.1
    ATT_DIM: 512
    ACT: 'CELU'
    ENCODE_DROPOUT: 0.1
    DECODE_DROPOUT: 0.1
    ENCODE_LAYERS: 3
    DECODE_LAYERS: 3
    TYPE: 'LowRank'
    ATTTYPE: 'SCAtt'
    HEAD: 8
    ENCODE_FF_DROPOUT: 0.1
    DECODE_FF_DROPOUT: 0.1
    ELU_ALPHA: 1.3
    BIFEAT_EMB_ACT: 'RELU'
    ENCODE_BIFEAT_EMB_DROPOUT: 0.1
    DECODE_BIFEAT_EMB_DROPOUT: 0.1

############################ SOLVER ############################
SOLVER:
  BASE_LR: 0.0001
  TYPE: 'ADAM'
  MAX_EPOCH: 10
  MAX_ITER: -1
  GRAD_CLIP: 1.0
  GRAD_CLIP_TYPE: 'Clamp'
  WEIGHT_DECAY: 0.0000
  WEIGHT_DECAY_BIAS: 0.0
  BIAS_LR_FACTOR: 1
  DISPLAY: 20
  TEST_INTERVAL: 1
  SNAPSHOT_ITERS: 2
  MAX_CHECKPOINTS: 3

  SGD:
    MOMENTUM: 0.9
  ADAM:
    BETAS: [0.9, 0.98]
    EPS: 1.0e-9
  LR_POLICY:
    TYPE: 'CosineAnnealing'
    ETA_MIN: 0.0
    WARMUP_RATIO: 0.1
    STEP_TYPE: 'Iter'

############################ LOSSES ############################
LOSSES:
  XE_TYPE: 'LabelSmoothing'
  LABELSMOOTHING: 0.1
  RL_TYPE: 'RewardCriterion'

############################ SCORER ############################
SCORER:
  TYPES: ['Bleu_1', 'Bleu_2', 'Bleu_3', 'Bleu_4', 'ROUGE_L', 'CIDEr', 'METEOR', 'SPICE']
  WEIGHTS: [0.1, 0.1, 0.1, 0.2, 0.1, 0.3, 0.1, 0.1]

############################ INFERENCE ############################
INFERENCE:
  VOCAB: './PureT/data/coco_karpathy/coco_vocabulary.txt'
  ID_KEY: 'image_id'
  CAP_KEY: 'caption'
  EVAL: 'CocoHFEvaluer'
  VAL_ANNFILE: './PureT/data/stanford_dogs_hf/validation/captions.json'
  TEST_ANNFILE: './PureT/data/stanford_dogs_hf/validation/captions.json'
  BEAM_SIZE: 3
  GREEDY_DECODE: True
