LOGGER_NAME: 'log'
SEED: 1234

############################ TEST ############################
TEST:
  BATCH_SIZE: 20

############################ DATA_LOADER ############################
DATA_LOADER:
  NUM_WORKERS: 0
  SHUFFLE: False
  TRAIN_ID: './PureT/data/coco_karpathy/train_ids.json'
  VAL_ID: './PureT/data/coco_karpathy/validation_ids.json'
  TEST_ID: './PureT/data/coco_karpathy/test_ids.json'
  SEQ_PER_IMG: 5

############################ CORRUPTION ############################
CORRUPTION:
  BYTE_STREAM_TYPES: ['rbbf', 'rbsl', 'metadata_loss']
  BYTE_STREAM_LEVEL: 'S0'

############################ MODEL ############################
MODEL:
  TYPE: 'OPENROUTER'
  OPENROUTER:
    # MODEL_ID: 'google/gemini-2.5-flash'
    MODEL_ID: 'openai/gpt-5.1'
    # MODEL_ID: 'qwen/qwen3-vl-32b-instruct'
    # MODEL_ID: 'x-ai/grok-4'
    # MODEL_ID: 'mistralai/mistral-large-2512'
    # MODEL_ID: 'anthropic/claude-haiku-4.5'
    API_BASE: 'https://openrouter.ai/api/v1/chat/completions'
    API_KEY: ''
    API_KEY_PATH: 'openrouter_api'
    HTTP_REFERER: ''
    APP_TITLE: 'ByteCaption'
    PROXY: 'http://127.0.0.1:7897'
    TIMEOUT: 15
    MAX_TOKENS: 64
    TEMPERATURE: 0.0
    TOP_P: 1.0
    MAX_WORKERS: 20
    BATCH_SIZE: 0
    SYSTEM_PROMPT: 'You are a vision captioning model.'
    USER_PROMPT: 'You are given a possibly corrupted JPEG image. Output a short COCO-style caption. Use 5-12 words. Output only the caption with no extra text.'
    # USER_PROMPT: 'You are given a possibly corrupted JPEG image. If you can decode it, output a short COCO-style caption. If you cannot decode it, output exactly: this is a dummy caption for an undecodable image Output only the caption with no extra text.'
    IMAGE_DETAIL: 'low'
    REASONING: { enabled: false }
    PLACEHOLDER: 'A person standing in a room.'
    RETRY:
      MAX_ATTEMPTS: 5
      BACKOFF_BASE: 1.2
      BACKOFF_MAX: 6.0
      ON_EMPTY_RESPONSE: false
      ON_TRUNCATED: false

############################ SCORER ############################
SCORER:
  TYPES: ['Bleu_1', 'Bleu_2', 'Bleu_3', 'Bleu_4', 'ROUGE_L', 'CIDEr', 'METEOR', 'SPICE']
  WEIGHTS: [0.1, 0.1, 0.1, 0.2, 0.1, 0.3, 0.1, 0.1]

############################ INFERENCE ############################
INFERENCE:
  VOCAB: './PureT/data/coco_karpathy/coco_vocabulary.txt'
  ID_KEY: 'image_id'
  CAP_KEY: 'caption'
  EVAL: 'CocoHFEvaluer'
  VAL_ANNFILE: './PureT/data/coco_karpathy/captions_validation.json'
  TEST_ANNFILE: './PureT/data/coco_karpathy/captions_test.json'
  BEAM_SIZE: 5
  # GREEDY_DECODE: True
